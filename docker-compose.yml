version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: reservation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./reservation_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./reservation_backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=reservation_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - OPENAI_API_KEY=${OPENAI_API_KEY}

  frontend:
    build: ./reservation_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
