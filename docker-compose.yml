version: '3.9'

services:
  # ─── PostgreSQL ────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-aimo_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ────────────────────────────────────
  backend:
    build:
      context: ./reservation_backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "
        python manage.py migrate --no-input &&
        python manage.py collectstatic --no-input &&
        gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
      "
    volumes:
      - ./reservation_backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DB_HOST: db
      DB_NAME: ${DB_NAME:-aimo_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_PORT: 5432
      SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://frontend:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # ─── React Frontend ────────────────────────────────────
  frontend:
    build:
      context: ./reservation_frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./reservation_frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
  backend_static:
